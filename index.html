<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Baharım ❤️</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav class="navbar">
        <div class="nav-inner">
            <a class="nav-brand" href="index.html">❤️ Baharım</a>
            <div class="nav-links">
                <a href="index.html" class="active">Ana Sayfa</a>
                <a href="ask.html">Aşkımız 💕</a>
                <a href="liste.html">Eksik Listesi 🏠</a>
            </div>
        </div>
    </nav>

    <main class="home-main">

        <!-- BİRLİKTELİK SAYACI -->
        <section class="counter-section">
            <h2 class="counter-title">Beraber Geçirdiğimiz Zaman</h2>
            <div class="counter-grid">
                <div class="counter-item">
                    <span id="days">000</span>
                    <label>Gün</label>
                </div>
                <div class="counter-item">
                    <span id="hours">00</span>
                    <label>Saat</label>
                </div>
                <div class="counter-item">
                    <span id="minutes">00</span>
                    <label>Dakika</label>
                </div>
                <div class="counter-item">
                    <span id="seconds">00</span>
                    <label>Saniye</label>
                </div>
            </div>
            <p class="counter-subtitle">26 Ekim 2025'ten beri ❤️</p>
        </section>

        <div class="counters-divider">💍</div>

        <!-- DÜĞÜN GERİ SAYIMI -->
        <section class="counter-section wedding-section">
            <h2 class="counter-title wedding-title">Düğünümüze Kalan</h2>
            <div class="counter-grid">
                <div class="counter-item wedding-item">
                    <span id="w-days">000</span>
                    <label>Gün</label>
                </div>
                <div class="counter-item wedding-item">
                    <span id="w-hours">00</span>
                    <label>Saat</label>
                </div>
                <div class="counter-item wedding-item">
                    <span id="w-minutes">00</span>
                    <label>Dakika</label>
                </div>
                <div class="counter-item wedding-item">
                    <span id="w-seconds">00</span>
                    <label>Saniye</label>
                </div>
            </div>
            <p class="counter-subtitle">22 Ağustos 2026 💍</p>
        </section>

    </main>

    <script src="counter.js"></script>
</body>

</html>
